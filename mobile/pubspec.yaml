name: team_pm_mobile
description: "RoboMaster team PM Android app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Network
  dio: ^5.7.0
  retrofit: ">=4.4.0 <4.9.0"

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Geolocation
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Charts
  fl_chart: ^0.69.2

  # I18n / formatting
  intl: ^0.20.2

  # Media picker for task completion attachments
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.5
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.3

  # App icon generation
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "assets/icon/icon_background.png"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true
