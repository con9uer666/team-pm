version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: team_pm_postgres
    environment:
      POSTGRES_DB: team_pm
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_123}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d team_pm"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: team_pm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: team_pm_backend
    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD:-dev_password_123}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: team_pm_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  uploads_data:
